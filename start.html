<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITN Mass Campaign 2027</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#1e88e5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.header{
    text-align:center;
    padding:30px;
    background:white;
}

.header img{
    width:80px;
    margin-bottom:10px;
}

.header h1{
    font-size:28px;
    color:#0f4c81;
    margin-bottom:10px;
}

.header h2{
    font-size:22px;
    margin-bottom:8px;
}

.header h3{
    font-size:18px;
    margin-bottom:8px;
}

.header h4{
    font-size:16px;
    color:#555;
}

.main{
    background:white;
    padding:40px 20px;
}

.login-card{
    max-width:400px;
    margin:auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.login-top{
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    text-align:center;
    padding:25px;
}

.login-top img{
    width:90px;
}

.form-group{
    padding:15px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.btn{
    width:100%;
    border:none;
    padding:15px;
    cursor:pointer;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.login-btn{
    background:#1565c0;
    color:white;
}

.login-btn:hover{
    background:#0d47a1;
}

.scan-btn{
    background:#26a69a;
    color:white;
    margin-top:10px;
}

.scan-btn:hover{
    background:#00897b;
}

.action-buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:30px;
}

.action-card{
    background:white;
    border-radius:12px;
    padding:30px 15px;
    text-align:center;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    transition:.3s;
}

.action-card:hover{
    transform:translateY(-5px);
}

.connectivity{
    border-top:5px solid #2196f3;
}

.tracking{
    border-top:5px solid #4caf50;
}

.provision{
    border-top:5px solid #ff9800;
}

.partners{
    background:white;
    padding:20px;
}

.partners-title{
    text-align:center;
    font-size:22px;
    color:#0f4c81;
    margin-bottom:20px;
    font-weight:bold;
}

.partner-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.partner{
    background:#f5f8fc;
    border-radius:10px;
    padding:20px;
    text-align:center;
    border:1px solid #ddd;
}

.partner img{
    width:70px;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    background:#0f4c81;
    color:white;
    padding:15px;
    font-weight:bold;
}

@media(max-width:768px){

.action-buttons{
    grid-template-columns:1fr;
}

.partner-grid{
    grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<div class="container">

    <div class="header">

        <!-- Ministry Logo -->
        <img src="moh_logo.png" alt="MOH Logo">

        <h2>INSECTICIDE TREATED NET MASS CAMPAIGN 2027</h2>

        <h2>MINISTRY OF HEALTH</h2>

        <h3>NATIONAL MALARIA CONTROL PROGRAMME</h3>

        <h4>SIERRA LEONE</h4>

    </div>

    <div class="main">

        <div class="login-card">

            <div class="login-top">
                <img src="ICF-SL Logo.png" alt="ICF Logo">
            </div>

            <div class="form-group">
                <input type="text" placeholder="Username">
            </div>

            <div class="form-group">
                <input type="password" placeholder="Password">
            </div>

            <div class="form-group">
                <button class="btn login-btn">
                    LOGIN
                </button>
            </div>

            <div class="form-group">
                <button class="btn scan-btn">
                    SCAN USER ID CARD
                </button>
            </div>

        </div>

        <div class="action-buttons">

            <div class="action-card connectivity">
                INTERNET CONNECTIVITY
            </div>

            <div class="action-card tracking">
                DEVICE TRACKING
            </div>

            <div class="action-card provision">
                PROVISION
            </div>

        </div>

    </div>

    <div class="partners">

        <div class="partners-title">
            IMPLEMENTING PARTNERS
        </div>

        <div class="partner-grid">

            <div class="partner">
                <img src="global_fund.png" alt="">
                <h5>GLOBAL FUND</h5>
            </div>

            <div class="partner">
                <img src="world-vision-logo.png" alt="">
                <h5>WORLD VISION</h5>
            </div>

            <div class="partner">
                <img src="World-Health-Organization-WHO-Logo.png" alt="">
                <h5>WORLD HEALTH ORGANIZATION</h5>
            </div>

        </div>

    </div>

    <div class="footer">
        Powered by ICF-SL @ 2026
    </div>

</div>

</body>
</html>
